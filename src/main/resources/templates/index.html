<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Storage Management System">
    <title>Storage</title>
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="shortcut icon" href="/img/logistics.png" />
    <link rel="stylesheet" href="/font-awesome/css/font-awesome.css" />
    <link rel="stylesheet" href="/css/zabuto_calendar.css" />
    <link rel="stylesheet" href="/js/gritter/css/jquery.gritter.css" />
    <link rel="stylesheet" href="/lineicons/style.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/style-responsive.css" />
    <script src="/js/chart-master/Chart.js"></script>
    <script src="/js/html5shiv.js"></script>
    <script src="/js/respond.min.js"></script>
</head>
<body>
<section id="container">
    <!-- Header Section -->
    <header class="header black-bg">
        <div class="sidebar-toggle-box">
            <div class="fa fa-bars tooltips" data-placement="right" data-original-title="Μενού"></div>
        </div>
        <a href="#" class="logo"><b>Storage</b></a>
        <div class="nav notify-row" id="top_menu">
            <ul class="nav top-menu">
                <!-- Notifications -->
                <li class="dropdown">
                    <a data-toggle="dropdown" class="dropdown-toggle">
                        <i class="fa fa-truck"></i>
                        <span class="badge bg-theme" id="newOrdersCount"></span>
                    </a>
                    <ul class="dropdown-menu extended tasks-bar">
                        <div class="notify-arrow notify-arrow-green"></div>
                        <li id="superAdminMenu"><a href="/neworderByStores"><p class="green">Νέες παραγγελίες</p></a></li>
                        <li id="localAdminMenu"><a href="/viewAllOrders"><p class="green">Παραγγελίες προς έγκριση</p></a></li>
                    </ul>
                </li>
            </ul>
        </div>
        <div class="top-menu">
            <ul class="nav pull-right top-menu">
                <li><a class="logout" href="/logout">Αποσύνδεση</a></li>
            </ul>
            <ul class="nav pull-right top-menu">
                <li><a class="store" href="#" id="storeTitle"></a></li>
            </ul>
        </div>
    </header>

    <!-- Sidebar Menu -->
    <object type="text/html" data="menu.html"></object>

    <!-- Main Content Section -->
    <section id="main-content">
        <section class="wrapper">
            <!-- Alert for Exporting Excel -->
            <div id="myDIV" style="display: none; cursor: pointer" onclick="hideDiv()">
                <div class="alert alert-info">Παρακαλώ αναμείνατε για την εξαγωγή του αρχείου Excel.</div>
            </div>

            <!-- Dashboard Sections -->
            <div class="row">
                <!-- User Management Section -->
                <div class="col-md-4 col-sm-4 mb" style="cursor: pointer;" onclick="users()" id="usersSection">
                    <div class="darkblue-panel pn">
                        <div class="darkblue-header"><h5>Διαχείριση Χρηστών</h5></div>
                        <h1 class="mt"><i class="fa fa-user fa-3x"></i></h1>
                        <p id="userCountText"></p>
                    </div>
                </div>

                <!-- Warehouse Management Section -->
                <div class="col-md-4 col-sm-4 mb" style="cursor: pointer;" onclick="stores()" id="storesSection">
                    <div class="weather-2 pn">
                        <div class="weather-2-header"><p>Διαχείριση Αποθηκών</p></div>
                        <div class="row centered">
                            <img src="/img/logistics.png" class="img-circle" width="120" height="120" />
                        </div>
                        <div class="row data">
                            <div class="col-sm-6 goleft"><h6>Ενεργές Αποθήκες</h6></div>
                            <div class="col-sm-6 goright"><h6 id="storageCountText"></h6></div>
                        </div>
                    </div>
                </div>

                <!-- Material Management Section -->
                <div class="col-md-4 col-sm-4 mb" style="cursor: pointer;" onclick="materials()" id="materialsSection">
                    <div class="product-panel-2 pn">
                        <div class="badge badge-hot"><i class="fa fa-eye"></i></div>
                        <img src="/img/rouxa.jpg" width="200" alt="Material Management" />
                        <h5 class="mt">Διαχείριση Ενδυμάτων</h5>
                        <h6 id="materialCountText"></h6>
                        <button class="btn btn-small btn-theme04">Πίνακες</button>
                    </div>
                </div>
            </div>

            <!-- Additional Sections for Orders and Stock -->
            <!-- Similar updates as above for remaining sections -->

        </section>
    </section>
</section>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/index')
            .then(response => response.json())
            .then(data => {
                document.getElementById('userCountText').textContent = data.userCount;
                document.getElementById('materialCountText').textContent = data.materialCount;
                document.getElementById('newOrdersCount').textContent = data.newOrdersCount;
                // Add logic for additional fields
            })
            .catch(error => console.error('Error fetching dashboard data:', error));
    });
</script>

</html>
