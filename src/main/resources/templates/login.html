<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage</title>
    <base href="/">
    <!-- Bootstrap core CSS -->
    <link rel="shortcut icon" href="/img/logistics.png">
    <link rel="stylesheet" href="/css/bootstrap.css"/>
    <link rel="stylesheet" href="/font-awesome/css/font-awesome.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/style-responsive.css"/>
    <link rel="stylesheet" href="/css/clock.css"/>
</head>
<body style="background-image:url('/img/login-bg.png'); background-repeat: repeat; background-size: cover;" onload="clock()">
<div id="myNav" class="overlay">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="overlay-content">
        <a href="/login"><span style="color: #d39e00; font-size: 45px;"><center>Storage</center></span></a>
        <center><a href="/login" id="showtime">Storage</a></center>
    </div>
</div>
<div id="login-page">
    <div class="container">
        <form class="form-login" action="/api/auth/login" method="post" id="formLogin">
            <h2 class="form-login-heading">Συνδεθείτε</h2>
            <div class="login-wrap">
                <br>
                <div id="error-message" style="display:none; text-align: center;" class="alert alert-danger">Παρακαλώ ελέγξτε τα διαπιστευτήρια σας.</div>
                <div id="logout-message" style="display:none; background-color:orange; color: black; text-align: center;" class="alert alert-info">Αποσυνδεθήκατε.</div>
                <!--<input type="hidden" name="_csrf" value="${_csrf.token}"/>-->
                <input class="form-control" type="text" id="username" name="username" style="text-align: center" placeholder="όνομα χρήστη" required="required">
                <br>
                <input class="form-control" type="password" id="password" name="password" style="text-align: center" placeholder="κωδικός πρόσβασης" required="required">
                <br>
                <button class="btn btn-theme btn-block" type="submit" required="required"><i class="fa fa-lock"></i> Σύνδεση</button>
                <hr>
            </div>
        </form>
    </div>
</div>
<footer class="site-footer">
    <div class="text-center">
        2024 - Διαχείριση Αποθηκών
    </div>
</footer>
<script src="/js/jquery.js"></script>
<script src="/js/bootstrap.min.js"></script>
<script src="/js/jquery.backstretch.min.js"></script>
<script src="/js/clock.js"></script>
<script>
    // JavaScript to handle form submission and API interaction
    document.getElementById('formLogin').addEventListener('submit', function(event) {
        event.preventDefault();  // Prevent the form from submitting in the traditional way
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                // Handle successful response
                window.location.href = '/user/index';
            })
            .catch(error => {
                // Handle error
                document.getElementById('error-message').style.display = 'block';
            });
    });
</script>
</body>
</html>
