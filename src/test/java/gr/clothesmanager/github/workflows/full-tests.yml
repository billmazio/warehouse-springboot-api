name: Full Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Κάθε μέρα στις 2πμ

jobs:
  integration:
    name: Full E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Playwright Browsers
        run: |
          mvn exec:java -e \
            -D exec.mainClass=com.microsoft.playwright.CLI \
            -D exec.args="install --with-deps"

      # Τρέξε το FullIntegrationTestSuite
      - name: Run Full Integration Test Suite
        run: |
          mvn test -Dtest=gr.clothesmanager.suites.FullIntegrationTestSuite

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: full-test-results
          path: |
            target/surefire-reports/
            target/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: full-test-screenshots
          path: target/screenshots/
          retention-days: 7

      # Publish test report
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit