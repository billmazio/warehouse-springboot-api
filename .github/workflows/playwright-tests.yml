name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Full Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps
          npx playwright install

      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      - name: Start Spring Boot Backend
        env:
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
        run: |
          cd backend
          mvn spring-boot:run -DskipTests > /tmp/backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Attempt $i: waiting for backend..."
            sleep 3
          done

      - name: Start React Frontend
        run: |
          cd frontend/frontend
          REACT_APP_API_URL=http://localhost:8080 npm start > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend is ready"
              break
            fi
            echo "Attempt $i: waiting for frontend..."
            sleep 2
          done
          sleep 10

      - name: Verify services are running
        run: |
          echo "Checking backend..."
          curl -v http://localhost:8080 || echo "Backend not responding"
          echo "Checking frontend..."
          curl -s http://localhost:3000 | head -20

      - name: Show backend logs
        if: always()
        run: cat /tmp/backend.log | tail -150

      - name: Run Playwright Tests
        run: |
          cd backend
          mvn verify

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: backend/target/screenshots/
          retention-days: 7

      - name: Upload Backend Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: /tmp/backend.log
          retention-days: 7

      - name: Upload Frontend Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: /tmp/frontend.log
          retention-days: 7