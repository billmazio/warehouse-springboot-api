name: Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps
          npx playwright install

      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL is ready!"

      - name: Build backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Start backend
        run: |
          cd backend
          java -jar target/*.jar \
            --spring.datasource.url=jdbc:mysql://127.0.0.1:3306/clothes_manager?useSSL=false\&allowPublicKeyRetrieval=true \
            --spring.datasource.username=clothes_user \
            --spring.datasource.password=clothes_user \
            --spring.jpa.hibernate.ddl-auto=update \
            --application.security.jwt.secret-key=${{ secrets.JWT_SECRET_KEY }} \
            --jwt.expiration=${{ secrets.JWT_EXPIRATION }} \
            --cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000 \
            > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/setup/status > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done
          echo "Backend failed to start!"
          cat /tmp/backend.log | tail -100
          exit 1

      - name: Start frontend
        run: |
          cd frontend/frontend
          REACT_APP_API_URL=http://localhost:8080 npm start > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend is ready!"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 2
          done

      - name: Run Smoke Tests
        run: |
          cd backend
          mvn test -Dtest=SmokeTestSuite

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: backend/target/screenshots/
          retention-days: 7

      - name: Show Backend Logs
        if: failure()
        run: cat /tmp/backend.log | tail -150