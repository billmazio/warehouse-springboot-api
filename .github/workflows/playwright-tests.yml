name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Full Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend code
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright Browsers
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps

      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      # -----------------------------
      # START BACKEND WITH HEALTH CHECK
      # -----------------------------
      - name: Start Spring Boot Backend
        run: |
          cd backend
          mvn spring-boot:run -DskipTests > /tmp/backend.log 2>&1 &
          
          echo "Waiting for backend on :8080..."
          for i in {1..90}; do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Backend is ready!"
              break
            fi
            echo "Backend not ready yet ($i)..."
            sleep 2
          done

      # -----------------------------
      # START FRONTEND WITH HEALTH CHECK
      # -----------------------------
      - name: Start React Frontend
        run: |
          cd frontend/frontend
          REACT_APP_API_URL=http://localhost:8080 npm start > /tmp/frontend.log 2>&1 &
          
          echo "Waiting for frontend on :3000..."
          for i in {1..120}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend is ready!"
              break
            fi
            echo "Frontend not ready yet ($i)..."
            sleep 2
          done

      # -----------------------------
      # RUN INTEGRATION TEST SUITE
      # -----------------------------
      - name: Run Full Integration Tests
        run: |
          cd backend
          xvfb-run mvn test -Dtest=gr.clothesmanager.suites.FullIntegrationTestSuite

      # -----------------------------
      # UPLOAD ARTIFACTS
      # -----------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/target/surefire-reports/
            backend/target/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: backend/target/screenshots/
          retention-days: 7
