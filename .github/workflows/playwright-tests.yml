name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Full Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      # -------------------------
      # ENVIRONMENT SETUP
      # -------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright browsers
        run: |
          npx playwright install-deps
          npx playwright install

      # -------------------------
      # FRONTEND
      # -------------------------
      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      - name: Build frontend (production)
        run: |
          cd frontend/frontend
          npm run build

      - name: Start frontend (serve)
        run: |
          cd frontend/frontend
          npx serve -s build -l 3000 > /tmp/frontend.log 2>&1 &

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend ready"
              break
            fi
            echo "Waiting for frontend ($i)..."
            sleep 2
          done

      # -------------------------
      # MYSQL READY CHECK
      # -------------------------
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL ($i)..."
            sleep 2
          done

      # -------------------------
      # BACKEND
      # -------------------------
      - name: Start Spring Boot Backend
        env:
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
        run: |
          cd backend

          export SPRING_DATASOURCE_URL="jdbc:mysql://localhost:3306/${DB_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
          export SPRING_DATASOURCE_USERNAME="${DB_USER}"
          export SPRING_DATASOURCE_PASSWORD="${DB_PASSWORD}"
          export SPRING_JPA_HIBERNATE_DIALECT="org.hibernate.dialect.MySQL8Dialect"
          export SPRING_JPA_HIBERNATE_DDL_AUTO="update"
          export SPRING_DEVTOOLS_RESTART_ENABLED=false

          mvn spring-boot:run -DskipTests > /tmp/backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend ($i)..."
            sleep 3
          done

      # -------------------------
      # DEBUG INFO
      # -------------------------
      - name: Verify services are running
        run: |
          echo "--- Backend check ---"
          curl -v http://localhost:8080 || echo "Backend unavailable"
          echo "--- Frontend check ---"
          curl -s http://localhost:3000 | head -20

      - name: Show backend logs (tail)
        if: always()
        run: tail -150 /tmp/backend.log

      # -------------------------
      # PLAYWRIGHT TESTS
      # -------------------------
      - name: Run Playwright Tests
        run: |
          cd backend
          mvn verify

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: backend/target/screenshots/
          retention-days: 7

      - name: Upload Backend Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: /tmp/backend.log
          retention-days: 7

      - name: Upload Frontend Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: /tmp/frontend.log
          retention-days: 7
