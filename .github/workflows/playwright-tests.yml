name: Playwright Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # CHECKOUT BOTH PROJECTS
      # ----------------------------------------
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      # ----------------------------------------
      # INSTALL JDK & MAVEN
      # ----------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Maven 3.9.9
        uses: s4u/setup-maven-action@v1.7.0
        with:
          maven-version: 3.9.9
          java-version: 17
          java-distribution: temurin

      - name: Verify Maven
        run: mvn --version

      # ----------------------------------------
      # CACHE MAVEN DEPENDENCIES
      # ----------------------------------------
      - name: Cache Maven deps
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven

      # ----------------------------------------
      # NODE & PLAYWRIGHT SETUP
      # ----------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install Playwright dependencies
        run: npx playwright install-deps

      - name: Install Playwright browsers
        run: npx playwright install

      # ----------------------------------------
      # INSTALL FRONTEND
      # ----------------------------------------
      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      # ----------------------------------------
      # START BACKEND + HEALTH CHECK
      # ----------------------------------------
      - name: Start backend
        run: |
          cd backend
          mvn spring-boot:run -DskipTests > /tmp/backend.log 2>&1 &
          
          echo "Waiting for backend (port 8080)..."
          for i in {1..90}; do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Backend ready!"
              break
            fi
            echo "Backend not ready ($i)..."
            sleep 2
          done

      # ----------------------------------------
      # START FRONTEND + HEALTH CHECK
      # ----------------------------------------
      - name: Start frontend
        run: |
          cd frontend/frontend
          REACT_APP_API_URL=http://localhost:8080 npm start > /tmp/frontend.log 2>&1 &
          
          echo "Waiting for frontend (port 3000)..."
          for i in {1..120}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend ready!"
              break
            fi
            echo "Frontend not ready ($i)..."
            sleep 2
          done

      # ----------------------------------------
      # RUN MAVEN-PLAYWRIGHT TESTS
      # ----------------------------------------
      - name: Run Playwright Tests (Java)
        run: |
          cd backend
          mvn verify

      # ----------------------------------------
      # UPLOAD ARTIFACTS
      # ----------------------------------------
      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: backend/target/playwright-report
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: backend/target/screenshots
          retention-days: 10
