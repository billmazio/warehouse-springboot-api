name: Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  regression:
    name: Regression Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend code
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright Browsers
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps

      - name: Configure frontend environment
        run: |
          cd frontend/frontend
          echo "REACT_APP_API_URL=http://localhost:8080" > .env

      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      - name: Start Spring Boot Backend
        run: |
          cd backend
          mvn spring-boot:run -DskipTests &
          sleep 60

      - name: Start React Frontend
        run: |
          cd frontend/frontend
          npm start &
          sleep 30

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health || true; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:3000 || true; do sleep 2; done'

      - name: Run Regression Test Suite
        run: |
          cd backend
          mvn test -Dtest=gr.clothesmanager.suites.RegressionTestSuite

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: backend/target/screenshots/
          retention-days: 30