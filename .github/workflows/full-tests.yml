name: Full Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  integration:
    name: Full E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend code
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright Browsers
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Start Spring Boot Backend
        run: |
          cd backend
          mvn spring-boot:run -DskipTests &
          sleep 15

      - name: Start React Frontend
        run: |
          cd frontend
          npm start &
          sleep 15

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health || true; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:3000 || true; do sleep 2; done'

      - name: Run Full Integration Test Suite
        run: |
          cd backend
          mvn test -Dtest=gr.clothesmanager.suites.FullIntegrationTestSuite

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: |
            backend/target/surefire-reports/
            backend/target/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-screenshots
          path: backend/target/screenshots/
          retention-days: 7

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit