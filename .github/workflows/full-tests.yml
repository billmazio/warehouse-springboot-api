name: Full Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration:
    name: Full E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend code
        uses: actions/checkout@v4
        with:
          repository: billmazio/warehouse-react-ui
          path: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/frontend/package-lock.json

      - name: Install Playwright Browsers
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps

      - name: Install frontend dependencies
        run: |
          cd frontend/frontend
          npm ci

      - name: Start Spring Boot Backend
        run: |
          cd backend
          mvn spring-boot:run -DskipTests &
          sleep 60

      - name: Start React Frontend
        run: |
          cd frontend/frontend
          export REACT_APP_API_URL=http://localhost:8080
          npm start > /tmp/frontend.log 2>&1 &
          sleep 40

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000 | grep -q "<!DOCTYPE"; then
              echo "Frontend is ready"
              break
            fi
            echo "Attempt $i: waiting for frontend..."
            sleep 2
          done
          sleep 10

      - name: Run Full Integration Test Suite
        run: |
          cd backend
          mvn test -Dtest=gr.clothesmanager.suites.FullIntegrationTestSuite

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: |
            backend/target/surefire-reports/
            backend/target/test-results/
          retention-days: 30

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-screenshots
          path: backend/target/screenshots/
          retention-days: 7